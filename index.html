<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha - Campeonato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Jogo da Velha</h1>
        <p class="subtitle">O primeiro a atingir 5 vitórias é o campeão!</p>
        
        <div class="scoreboard">
            <div class="player-score x-score">
                <span>Jogador X</span>
                <span id="scoreX" class="score-number">0</span>
            </div>
            <div class="player-score o-score">
                <span>Jogador O</span>
                <span id="scoreO" class="score-number">0</span>
            </div>
        </div>

        <div class="status-box">
            <div class="status" id="status">Vez do Jogador: X</div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="restartBtn">Próxima Rodada</button>
            <button id="resetChampionshipBtn" class="hidden">Iniciar Novo Campeonato</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
